name: foodbridge

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodbridge}
      POSTGRES_DB: ${POSTGRES_DB:-foodbridge}
    ports:
      - "5432:5432"
    volumes:
      - foodbridge_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foodbridge} -d ${POSTGRES_DB:-foodbridge}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  foodbridge_pg_data:
